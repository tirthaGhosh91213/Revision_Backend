<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>File Share App</title>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4f4f4;
      text-align:center;
      padding:50px;
    }
    .container{
      background:white;
      padding:30px;
      border-radius:10px;
      width:400px;
      margin:auto;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }
    button{
      padding:10px 20px;
      background:#007bff;
      color:white;
      border:none;
      border-radius:5px;
      cursor:pointer;
    }
    button:hover{
      background:#0056b3;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Welcome to File Share</h1>
    <p>This is a simple file sharing application built with Express.</p>

    <input type="file">
    <br><br>
    <button>Upload File</button>

    <p style="margin-top:20px; color:gray;">
      Upload and share files easily.
    </p>
  </div>

</body>
</html>
