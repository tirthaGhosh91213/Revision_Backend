<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Page Not Found</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:white;
}

.container{
    text-align:center;
}

h1{
    font-size:120px;
    font-weight:bold;
}

h2{
    margin:10px 0;
    font-size:28px;
}

p{
    margin-bottom:25px;
    opacity:0.9;
}

a{
    text-decoration:none;
    background:white;
    color:#764ba2;
    padding:12px 25px;
    border-radius:30px;
    font-weight:bold;
    transition:0.3s;
}

a:hover{
    background:#f1f1f1;
}

</style>
</head>

<body>

<div class="container">

<h1>404</h1>
<h2>Oops! Page Not Found</h2>

<p>The page you are looking for might have been removed or does not exist.</p>

<a href="/">Go Back Home</a>

</div>

</body>
</html>
