<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Form</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:25px;
    width:350px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="container">
<h2>Contact Form</h2>

<form action="/contact" method="post">

<label>Name</label>
<input type="text" name="user[name]" required>

<label>Email</label>
<input type="email" name="user[email]" required>

<label>Phone</label>
<input type="tel" name="user[phone]">

<label>Message</label>
<textarea name="user[message]"></textarea>

<button type="submit">Submit</button>

</form>
</div>

</body>
</html>
